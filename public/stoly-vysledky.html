<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kulaté stoly — výsledky — AI Ladies Night</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=DM+Serif+Display&display=swap" rel="stylesheet">
  <style>
    :root {
      --al-gold: #c49f47;
      --al-gold-dark: #7a5a1e;
      --al-gold-light: #f8f2e4;
      --al-blush-400: #e8849a;
      --al-dark: #0d0d0d;
      --al-warm-gray: #9c8e82;
      --al-gold-gradient: linear-gradient(115deg, #7a5a1e 0%, #b8892a 22%, #c49f47 40%, #d4bc6a 55%, #c49f47 68%, #9a7428 84%, #7a5a1e 100%);
      --font-dm-serif: "DM Serif Display", Georgia, serif;
      --font-dm-sans: "DM Sans", system-ui, sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 18px; }
    body {
      font-family: var(--font-dm-sans), sans-serif;
      color: #fff;
      background: var(--al-dark);
      min-height: 100vh;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* Decorative floating orbs */
    .deco-orb {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      filter: blur(80px);
      opacity: 0.25;
      z-index: 0;
      animation: floatOrb 12s ease-in-out infinite;
    }
    @keyframes floatOrb {
      0%, 100% { transform: translate(0, 0); }
      33% { transform: translate(15px, -20px); }
      66% { transform: translate(-10px, 10px); }
    }

    /* Top bar */
    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(13,13,13,0.92);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      padding: 1rem 2.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1.5rem;
    }
    .topbar-left {
      display: flex;
      align-items: center;
      gap: 1.25rem;
    }
    .topbar-logo {
      font-family: var(--font-dm-serif);
      font-size: 1.375rem;
      flex-shrink: 0;
    }
    .topbar-logo .ai { color: #fff; }
    .topbar-logo .ladies {
      background: var(--al-gold-gradient);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .topbar-divider {
      width: 1px;
      height: 1.5rem;
      background: rgba(255,255,255,0.1);
    }
    .topbar-label {
      font-size: 0.6875rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--al-gold);
    }

    /* Topic tabs */
    .tabs {
      display: flex;
      gap: 0.5rem;
    }
    .tab {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 2rem;
      padding: 0.5rem 1.125rem;
      font-family: var(--font-dm-sans);
      font-size: 0.75rem;
      font-weight: 600;
      color: rgba(255,255,255,0.5);
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .tab:hover { border-color: rgba(255,255,255,0.2); color: rgba(255,255,255,0.8); }
    .tab.active {
      background: var(--al-gold);
      border-color: var(--al-gold);
      color: #fff;
    }
    .tab .tab-count {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 1.25rem;
      height: 1.25rem;
      border-radius: 1rem;
      background: rgba(255,255,255,0.15);
      font-size: 0.625rem;
      font-weight: 700;
      margin-left: 0.375rem;
      padding: 0 0.375rem;
    }
    .tab.active .tab-count { background: rgba(255,255,255,0.25); }

    /* Controls */
    .topbar-right {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    .mode-btn {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 2rem;
      padding: 0.5rem 1rem;
      font-family: var(--font-dm-sans);
      font-size: 0.6875rem;
      font-weight: 600;
      color: rgba(255,255,255,0.6);
      cursor: pointer;
      transition: all 0.2s;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .mode-btn:hover { border-color: rgba(255,255,255,0.2); color: #fff; }
    .mode-btn.active { background: rgba(255,255,255,0.1); color: #fff; border-color: rgba(255,255,255,0.2); }
    .status-dot {
      width: 0.5rem;
      height: 0.5rem;
      border-radius: 50%;
      background: #4ade80;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* Main content */
    .main {
      position: relative;
      z-index: 1;
      padding: 2rem 2.5rem 3rem;
    }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 6rem 2rem;
    }
    .empty-icon {
      font-size: 3rem;
      margin-bottom: 1rem;
      opacity: 0.3;
    }
    .empty-state h2 {
      font-family: var(--font-dm-serif);
      font-size: 1.5rem;
      font-weight: 400;
      color: rgba(255,255,255,0.4);
      margin-bottom: 0.5rem;
    }
    .empty-state p {
      font-size: 0.875rem;
      color: rgba(255,255,255,0.25);
    }

    /* Grid view */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 1.25rem;
    }

    /* Card */
    .card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 1rem;
      padding: 1.5rem;
      position: relative;
      overflow: hidden;
      animation: cardEnter 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }
    .card::before {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: var(--al-gold-gradient);
    }
    .card.new-card {
      animation: cardEnter 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both,
                 cardGlow 2s ease-out both;
    }
    @keyframes cardEnter {
      from {
        opacity: 0;
        transform: translateY(30px) scale(0.96);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }
    @keyframes cardGlow {
      0% { box-shadow: 0 0 20px 4px rgba(196,159,71,0.3); }
      100% { box-shadow: 0 0 0 0 rgba(196,159,71,0); }
    }
    .card-name {
      font-size: 0.6875rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--al-gold);
      margin-bottom: 0.875rem;
    }
    .card-field { margin-bottom: 0.75rem; }
    .card-field:last-child { margin-bottom: 0; }
    .card-label {
      font-size: 0.625rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: rgba(255,255,255,0.3);
      margin-bottom: 0.125rem;
    }
    .card-text {
      font-size: 0.9375rem;
      color: rgba(255,255,255,0.85);
      line-height: 1.5;
    }
    .card-field.highlight .card-text {
      font-family: var(--font-dm-serif);
      font-size: 1.0625rem;
      color: #fff;
    }

    /* Focus / carousel mode */
    .focus-view { display: none; }
    .focus-view.active { display: flex; }
    .focus-view {
      align-items: center;
      justify-content: center;
      min-height: calc(100vh - 6rem);
      padding: 2rem;
    }
    .focus-card {
      max-width: 720px;
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 1.5rem;
      padding: 3rem;
      position: relative;
      overflow: hidden;
      animation: focusFade 0.6s ease both;
    }
    .focus-card::before {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: var(--al-gold-gradient);
    }
    @keyframes focusFade {
      from { opacity: 0; transform: scale(0.97); }
      to { opacity: 1; transform: scale(1); }
    }
    .focus-name {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--al-gold);
      margin-bottom: 1.5rem;
    }
    .focus-field { margin-bottom: 1.5rem; }
    .focus-field:last-child { margin-bottom: 0; }
    .focus-label {
      font-size: 0.6875rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: rgba(255,255,255,0.35);
      margin-bottom: 0.25rem;
    }
    .focus-text {
      font-size: 1.25rem;
      color: rgba(255,255,255,0.9);
      line-height: 1.5;
    }
    .focus-field.highlight .focus-text {
      font-family: var(--font-dm-serif);
      font-size: 1.75rem;
      color: #fff;
      line-height: 1.3;
    }
    .focus-counter {
      text-align: center;
      margin-top: 2rem;
      font-size: 0.75rem;
      color: rgba(255,255,255,0.25);
      letter-spacing: 0.05em;
    }
    .focus-nav {
      display: flex;
      justify-content: center;
      gap: 1rem;
      margin-top: 1.5rem;
    }
    .focus-nav-btn {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 50%;
      width: 2.5rem;
      height: 2.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(255,255,255,0.5);
      cursor: pointer;
      font-size: 1rem;
      transition: all 0.2s;
    }
    .focus-nav-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }

    /* Grid wrapper */
    .grid-view { display: block; }
    .grid-view.hidden { display: none; }
  </style>
</head>
<body>

<!-- Decorative orbs -->
<div class="deco-orb" style="width:300px;height:300px;background:radial-gradient(circle,rgba(196,159,71,0.4),transparent 70%);top:-80px;right:-80px;"></div>
<div class="deco-orb" style="width:200px;height:200px;background:radial-gradient(circle,rgba(232,132,154,0.3),transparent 70%);bottom:-60px;left:-60px;animation-delay:-4s;"></div>
<div class="deco-orb" style="width:150px;height:150px;background:radial-gradient(circle,rgba(196,159,71,0.3),transparent 70%);top:40%;left:10%;animation-delay:-7s;"></div>

<!-- Top bar -->
<div class="topbar">
  <div class="topbar-left">
    <div class="topbar-logo"><span class="ai">AI</span><span class="ladies">Ladies</span></div>
    <div class="topbar-divider"></div>
    <div class="topbar-label">✦ Kulaté stoly &middot; živě</div>
  </div>

  <div class="tabs" id="tabs">
    <button class="tab active" data-topic="all" onclick="switchTab('all')">
      Vše <span class="tab-count" id="count-all">0</span>
    </button>
    <button class="tab" data-topic="Promptování a komunikace s AI" onclick="switchTab('Promptování a komunikace s AI')">
      💬 Promptování <span class="tab-count" id="count-0">0</span>
    </button>
    <button class="tab" data-topic="Marketing, obsah a sociální sítě" onclick="switchTab('Marketing, obsah a sociální sítě')">
      📱 Marketing <span class="tab-count" id="count-1">0</span>
    </button>
    <button class="tab" data-topic="AI asistenti a produktivita" onclick="switchTab('AI asistenti a produktivita')">
      ⚡ Produktivita <span class="tab-count" id="count-2">0</span>
    </button>
  </div>

  <div class="topbar-right">
    <button class="mode-btn" id="mode-grid" onclick="setMode('grid')">Přehled</button>
    <button class="mode-btn" id="mode-focus" onclick="setMode('focus')">Fokus</button>
    <div class="status-dot" title="Živé načítání"></div>
  </div>
</div>

<!-- Main content -->
<div class="main">
  <!-- Empty state -->
  <div id="empty-state" class="empty-state">
    <div class="empty-icon">✦</div>
    <h2>Čekáme na první odpovědi...</h2>
    <p>Jakmile účastnice odešlou své zápisky, objeví se tady.</p>
  </div>

  <!-- Grid view -->
  <div id="grid-view" class="grid-view hidden">
    <div id="cards-grid" class="cards-grid"></div>
  </div>

  <!-- Focus view -->
  <div id="focus-view" class="focus-view">
    <div style="width:100%;max-width:720px;">
      <div id="focus-card" class="focus-card"></div>
      <div class="focus-nav">
        <button class="focus-nav-btn" onclick="focusPrev()">←</button>
        <button class="focus-nav-btn" onclick="focusNext()">→</button>
      </div>
      <div class="focus-counter" id="focus-counter"></div>
    </div>
  </div>
</div>

<script>
  const TOPIC_NAMES = [
    'Promptování a komunikace s AI',
    'Marketing, obsah a sociální sítě',
    'AI asistenti a produktivita',
  ];

  let allRecords = [];
  let displayedIds = new Set();
  let currentTab = 'all';
  let currentMode = 'grid';
  let focusIndex = 0;
  let pollInterval = null;
  let autoAdvanceInterval = null;

  function switchTab(topic) {
    currentTab = topic;
    document.querySelectorAll('.tab').forEach(t => {
      t.classList.toggle('active', t.dataset.topic === topic);
    });
    renderCards();
    if (currentMode === 'focus') {
      focusIndex = 0;
      renderFocus();
    }
  }

  function setMode(mode) {
    currentMode = mode;
    document.getElementById('mode-grid').classList.toggle('active', mode === 'grid');
    document.getElementById('mode-focus').classList.toggle('active', mode === 'focus');

    if (mode === 'grid') {
      document.getElementById('grid-view').classList.remove('hidden');
      document.getElementById('focus-view').classList.remove('active');
      stopAutoAdvance();
    } else {
      document.getElementById('grid-view').classList.add('hidden');
      document.getElementById('focus-view').classList.add('active');
      focusIndex = 0;
      renderFocus();
      startAutoAdvance();
    }
  }

  function getFiltered() {
    if (currentTab === 'all') return allRecords;
    return allRecords.filter(r => r.topic === currentTab);
  }

  function updateCounts() {
    document.getElementById('count-all').textContent = allRecords.length;
    TOPIC_NAMES.forEach((name, i) => {
      const count = allRecords.filter(r => r.topic === name).length;
      document.getElementById('count-' + i).textContent = count;
    });
  }

  function renderCards() {
    const filtered = getFiltered();
    const grid = document.getElementById('cards-grid');
    const empty = document.getElementById('empty-state');

    if (filtered.length === 0) {
      empty.style.display = 'block';
      document.getElementById('grid-view').classList.add('hidden');
      return;
    }

    empty.style.display = 'none';
    if (currentMode === 'grid') {
      document.getElementById('grid-view').classList.remove('hidden');
    }

    grid.innerHTML = '';
    filtered.forEach((r, i) => {
      const isNew = !displayedIds.has(r.id);
      const card = document.createElement('div');
      card.className = 'card' + (isNew ? ' new-card' : '');
      card.style.animationDelay = (isNew ? (i * 0.08) + 's' : '0s');

      let html = '';
      if (r.name) {
        html += '<div class="card-name">' + escHtml(r.name) + '</div>';
      } else {
        html += '<div class="card-name" style="color:rgba(255,255,255,0.2);">Anonymní</div>';
      }

      const fields = [
        { label: 'Nejlepší tip', value: r.bestTip, highlight: false },
        { label: 'Nejzajímavější nástroj', value: r.interestingTool, highlight: false },
        { label: 'Co chceme vyzkoušet', value: r.wantToTry, highlight: false },
        { label: 'Jedna věta', value: r.oneSentence, highlight: true },
      ];

      fields.forEach(f => {
        if (!f.value) return;
        html += '<div class="card-field' + (f.highlight ? ' highlight' : '') + '">' +
          '<div class="card-label">' + f.label + '</div>' +
          '<div class="card-text">' + escHtml(f.value) + '</div>' +
          '</div>';
      });

      card.innerHTML = html;
      grid.appendChild(card);
    });

    filtered.forEach(r => displayedIds.add(r.id));
  }

  function renderFocus() {
    const filtered = getFiltered();
    const card = document.getElementById('focus-card');
    const counter = document.getElementById('focus-counter');

    if (filtered.length === 0) {
      card.innerHTML = '<div style="text-align:center;padding:2rem;color:rgba(255,255,255,0.3);">Zatím žádné odpovědi</div>';
      counter.textContent = '';
      return;
    }

    if (focusIndex >= filtered.length) focusIndex = 0;
    if (focusIndex < 0) focusIndex = filtered.length - 1;

    const r = filtered[focusIndex];
    card.style.animation = 'none';
    card.offsetHeight;
    card.style.animation = '';

    let html = '';
    if (r.name) {
      html += '<div class="focus-name">' + escHtml(r.name) + '</div>';
    }

    const fields = [
      { label: 'Nejlepší tip', value: r.bestTip, highlight: false },
      { label: 'Nejzajímavější nástroj', value: r.interestingTool, highlight: false },
      { label: 'Co chceme vyzkoušet', value: r.wantToTry, highlight: false },
      { label: 'Jedna věta', value: r.oneSentence, highlight: true },
    ];

    fields.forEach(f => {
      if (!f.value) return;
      html += '<div class="focus-field' + (f.highlight ? ' highlight' : '') + '">' +
        '<div class="focus-label">' + f.label + '</div>' +
        '<div class="focus-text">' + escHtml(f.value) + '</div>' +
        '</div>';
    });

    card.innerHTML = html;
    counter.textContent = (focusIndex + 1) + ' / ' + filtered.length;
  }

  function focusPrev() {
    focusIndex--;
    renderFocus();
    restartAutoAdvance();
  }

  function focusNext() {
    focusIndex++;
    renderFocus();
    restartAutoAdvance();
  }

  function startAutoAdvance() {
    stopAutoAdvance();
    autoAdvanceInterval = setInterval(() => {
      focusIndex++;
      renderFocus();
    }, 8000);
  }

  function stopAutoAdvance() {
    if (autoAdvanceInterval) {
      clearInterval(autoAdvanceInterval);
      autoAdvanceInterval = null;
    }
  }

  function restartAutoAdvance() {
    if (currentMode === 'focus') startAutoAdvance();
  }

  // Keyboard navigation
  document.addEventListener('keydown', (e) => {
    if (currentMode === 'focus') {
      if (e.key === 'ArrowLeft') { focusPrev(); e.preventDefault(); }
      if (e.key === 'ArrowRight') { focusNext(); e.preventDefault(); }
    }
    if (e.key === 'g') setMode('grid');
    if (e.key === 'f') setMode('focus');
    if (e.key === '1') switchTab(TOPIC_NAMES[0]);
    if (e.key === '2') switchTab(TOPIC_NAMES[1]);
    if (e.key === '3') switchTab(TOPIC_NAMES[2]);
    if (e.key === '0') switchTab('all');
  });

  async function fetchRecords() {
    try {
      const res = await fetch('/api/stoly');
      const data = await res.json();
      if (data.success && data.records) {
        const hadRecords = allRecords.length;
        allRecords = data.records;
        updateCounts();
        renderCards();
        if (currentMode === 'focus' && hadRecords !== allRecords.length) {
          renderFocus();
        }
      }
    } catch (err) {
      console.error('Fetch error:', err);
    }
  }

  function escHtml(str) {
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }

  // Init
  setMode('grid');
  fetchRecords();
  pollInterval = setInterval(fetchRecords, 5000);
</script>

</body>
</html>
