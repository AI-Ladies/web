<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kulaté stoly — výsledky — AI Ladies Night</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=DM+Serif+Display&display=swap" rel="stylesheet">
  <style>
    :root {
      --al-gold: #c49f47;
      --al-gold-dark: #7a5a1e;
      --al-gold-light: #f8f2e4;
      --al-blush-400: #e8849a;
      --al-dark: #0d0d0d;
      --al-warm-gray: #9c8e82;
      --al-gold-gradient: linear-gradient(115deg, #7a5a1e 0%, #b8892a 22%, #c49f47 40%, #d4bc6a 55%, #c49f47 68%, #9a7428 84%, #7a5a1e 100%);
      --font-dm-serif: "DM Serif Display", Georgia, serif;
      --font-dm-sans: "DM Sans", system-ui, sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 18px; }
    body {
      font-family: var(--font-dm-sans), sans-serif;
      color: #fff;
      background: linear-gradient(145deg, #1A1612 0%, #2a1820 50%, #1A1612 100%);
      min-height: 100vh;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* Brand atmosphere orbs */
    .brand-atmosphere {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }
    .brand-atmosphere span {
      position: absolute;
      border-radius: 50%;
      filter: blur(60px);
    }
    .brand-atmosphere span:nth-child(1) {
      width: 38vw; height: 38vw; top: -12%; left: -10%;
      background: radial-gradient(circle, rgba(201,168,76,.28) 0%, rgba(201,168,76,.08) 45%, transparent 70%);
      animation: orbDrift 14s ease-in-out infinite;
    }
    .brand-atmosphere span:nth-child(2) {
      width: 22vw; height: 22vw; top: 8%; right: 12%;
      background: radial-gradient(circle, rgba(226,201,126,.2) 0%, transparent 65%);
      animation: orbDrift 14s ease-in-out infinite;
      animation-delay: -2s;
    }
    .brand-atmosphere span:nth-child(3) {
      width: 16vw; height: 16vw; top: 42%; left: 18%;
      background: radial-gradient(circle, rgba(201,100,90,.18) 0%, transparent 68%);
      animation: orbDrift 14s ease-in-out infinite;
      animation-delay: -5s;
    }
    .brand-atmosphere span:nth-child(4) {
      width: 28vw; height: 28vw; bottom: -8%; right: -6%;
      background: radial-gradient(circle, rgba(201,100,90,.22) 0%, rgba(249,212,218,.12) 40%, transparent 72%);
      animation: orbDrift 14s ease-in-out infinite;
      animation-delay: -7s;
    }
    .brand-atmosphere span:nth-child(5) {
      width: 10vw; height: 10vw; top: 28%; right: 32%;
      background: radial-gradient(circle, rgba(201,168,76,.35) 0%, transparent 70%);
      animation: orbDrift 11s ease-in-out infinite;
      animation-delay: -3s;
    }
    .brand-atmosphere span:nth-child(6) {
      width: 8vw; height: 8vw; bottom: 22%; left: 8%;
      background: radial-gradient(circle, rgba(249,212,218,.4) 0%, transparent 70%);
      animation: orbDrift 16s ease-in-out infinite;
      animation-delay: -9s;
    }
    @keyframes orbDrift {
      0%, 100% { transform: translate(0, 0) scale(1); opacity: .7; }
      33% { transform: translate(1.5vw, -2vh) scale(1.05); opacity: .95; }
      66% { transform: translate(-1vw, 1.5vh) scale(.97); opacity: .8; }
    }

    /* Top bar */
    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(26,22,18,0.88);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      padding: 1rem 2.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1.5rem;
    }
    .topbar-left {
      display: flex;
      align-items: center;
      gap: 1.25rem;
    }
    .topbar-logo {
      font-family: var(--font-dm-serif);
      font-size: 1.375rem;
      flex-shrink: 0;
    }
    .topbar-logo .ai { color: #fff; }
    .topbar-logo .ladies {
      background: var(--al-gold-gradient);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .topbar-divider {
      width: 1px;
      height: 1.5rem;
      background: rgba(255,255,255,0.1);
    }
    .topbar-label {
      font-size: 0.6875rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--al-gold);
    }

    /* Topic tabs */
    .tabs { display: flex; gap: 0.5rem; }
    .tab {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 2rem;
      padding: 0.5rem 1.125rem;
      font-family: var(--font-dm-sans);
      font-size: 0.75rem;
      font-weight: 600;
      color: rgba(255,255,255,0.5);
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .tab:hover { border-color: rgba(255,255,255,0.2); color: rgba(255,255,255,0.8); }
    .tab.active { background: var(--al-gold); border-color: var(--al-gold); color: #fff; }
    .tab .tab-count {
      display: inline-flex; align-items: center; justify-content: center;
      min-width: 1.25rem; height: 1.25rem; border-radius: 1rem;
      background: rgba(255,255,255,0.15); font-size: 0.625rem; font-weight: 700;
      margin-left: 0.375rem; padding: 0 0.375rem;
    }
    .tab.active .tab-count { background: rgba(255,255,255,0.25); }

    /* Controls */
    .topbar-right { display: flex; align-items: center; gap: 0.75rem; }
    .mode-btn {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 2rem;
      padding: 0.5rem 1rem;
      font-family: var(--font-dm-sans);
      font-size: 0.6875rem; font-weight: 600;
      color: rgba(255,255,255,0.6);
      cursor: pointer; transition: all 0.2s;
      text-transform: uppercase; letter-spacing: 0.05em;
    }
    .mode-btn:hover { border-color: rgba(255,255,255,0.2); color: #fff; }
    .mode-btn.active { background: rgba(255,255,255,0.1); color: #fff; border-color: rgba(255,255,255,0.2); }
    .status-dot {
      width: 0.5rem; height: 0.5rem; border-radius: 50%;
      background: #4ade80;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

    /* Main content */
    .main { position: relative; z-index: 1; padding: 2rem 2.5rem 3rem; }

    /* Empty state */
    .empty-state { text-align: center; padding: 6rem 2rem; }
    .empty-icon { font-size: 3rem; margin-bottom: 1rem; opacity: 0.3; }
    .empty-state h2 {
      font-family: var(--font-dm-serif); font-size: 1.5rem; font-weight: 400;
      color: rgba(255,255,255,0.4); margin-bottom: 0.5rem;
    }
    .empty-state p { font-size: 0.875rem; color: rgba(255,255,255,0.25); }

    /* === GRID VIEW === */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 1.25rem;
    }

    .card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 1rem;
      padding: 1.5rem;
      position: relative;
      overflow: hidden;
    }
    .card::before {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: var(--al-gold-gradient);
    }
    .card.entering {
      animation: cardFadeIn 0.8s ease both;
    }
    .card-name {
      font-size: 0.6875rem; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.08em;
      color: var(--al-gold); margin-bottom: 0.875rem;
    }
    .card-field { margin-bottom: 0.75rem; }
    .card-field:last-child { margin-bottom: 0; }
    .card-label {
      font-size: 0.625rem; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.06em;
      color: rgba(255,255,255,0.3); margin-bottom: 0.125rem;
    }
    .card-text { font-size: 0.9375rem; color: rgba(255,255,255,0.85); line-height: 1.5; }
    .card-field.highlight .card-text {
      font-family: var(--font-dm-serif);
      font-size: 1.0625rem; color: #fff;
    }

    /* === FOCUS VIEW === */
    .focus-view { display: none; }
    .focus-view.active { display: block; }
    .focus-grid {
      max-width: 780px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }
    .focus-card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 1.25rem;
      padding: 2rem 2.5rem;
      position: relative;
      overflow: hidden;
    }
    .focus-card::before {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: var(--al-gold-gradient);
    }
    .focus-card.entering {
      animation: cardFadeIn 0.8s ease both;
    }
    .focus-name {
      font-size: 0.75rem; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.1em;
      color: var(--al-gold); margin-bottom: 1.25rem;
    }
    .focus-field { margin-bottom: 1rem; }
    .focus-field:last-child { margin-bottom: 0; }
    .focus-label {
      font-size: 0.6875rem; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.06em;
      color: rgba(255,255,255,0.35); margin-bottom: 0.25rem;
    }
    .focus-text { font-size: 1.125rem; color: rgba(255,255,255,0.9); line-height: 1.55; }
    .focus-field.highlight .focus-text {
      font-family: var(--font-dm-serif);
      font-size: 1.375rem; color: #fff; line-height: 1.35;
    }

    /* Shared animation */
    @keyframes cardFadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .grid-view { display: block; }
    .grid-view.hidden { display: none; }
  </style>
</head>
<body>

<div class="brand-atmosphere">
  <span></span><span></span><span></span>
  <span></span><span></span><span></span>
</div>

<div class="topbar">
  <div class="topbar-left">
    <div class="topbar-logo"><span class="ai">AI</span><span class="ladies">Ladies</span></div>
    <div class="topbar-divider"></div>
    <div class="topbar-label">✦ Kulaté stoly &middot; živě</div>
  </div>

  <div class="tabs" id="tabs">
    <button class="tab active" data-topic="all" onclick="switchTab('all')">
      Vše <span class="tab-count" id="count-all">0</span>
    </button>
    <button class="tab" data-topic="Promptování a komunikace s AI" onclick="switchTab('Promptování a komunikace s AI')">
      💬 Promptování <span class="tab-count" id="count-0">0</span>
    </button>
    <button class="tab" data-topic="Marketing, obsah a sociální sítě" onclick="switchTab('Marketing, obsah a sociální sítě')">
      📱 Marketing <span class="tab-count" id="count-1">0</span>
    </button>
    <button class="tab" data-topic="AI asistenti a produktivita" onclick="switchTab('AI asistenti a produktivita')">
      ⚡ Produktivita <span class="tab-count" id="count-2">0</span>
    </button>
  </div>

  <div class="topbar-right">
    <button class="mode-btn active" id="mode-grid" onclick="setMode('grid')">Přehled</button>
    <button class="mode-btn" id="mode-focus" onclick="setMode('focus')">Fokus</button>
    <div class="status-dot" title="Živé načítání"></div>
  </div>
</div>

<div class="main">
  <div id="empty-state" class="empty-state">
    <div class="empty-icon">✦</div>
    <h2>Čekáme na první odpovědi...</h2>
    <p>Jakmile účastnice odešlou své zápisky, objeví se tady.</p>
  </div>

  <div id="grid-view" class="grid-view hidden">
    <div id="cards-grid" class="cards-grid"></div>
  </div>

  <div id="focus-view" class="focus-view">
    <div id="focus-grid" class="focus-grid"></div>
  </div>
</div>

<script>
  const TOPIC_NAMES = [
    'Promptování a komunikace s AI',
    'Marketing, obsah a sociální sítě',
    'AI asistenti a produktivita',
  ];

  let allRecords = [];
  let currentTab = 'all';
  let currentMode = 'grid';

  function getFiltered() {
    if (currentTab === 'all') return allRecords;
    return allRecords.filter(r => r.topic === currentTab);
  }

  function switchTab(topic) {
    currentTab = topic;
    document.querySelectorAll('.tab').forEach(t => {
      t.classList.toggle('active', t.dataset.topic === topic);
    });
    document.getElementById('cards-grid').innerHTML = '';
    document.getElementById('focus-grid').innerHTML = '';
    syncView();
  }

  function setMode(mode) {
    currentMode = mode;
    document.getElementById('mode-grid').classList.toggle('active', mode === 'grid');
    document.getElementById('mode-focus').classList.toggle('active', mode === 'focus');
    syncView();
  }

  function syncView() {
    const filtered = getFiltered();
    const empty = document.getElementById('empty-state');
    const gridWrap = document.getElementById('grid-view');
    const focusWrap = document.getElementById('focus-view');

    if (filtered.length === 0) {
      empty.style.display = 'block';
      gridWrap.classList.add('hidden');
      focusWrap.classList.remove('active');
      return;
    }

    empty.style.display = 'none';

    if (currentMode === 'grid') {
      gridWrap.classList.remove('hidden');
      focusWrap.classList.remove('active');
      renderGrid(filtered);
    } else {
      gridWrap.classList.add('hidden');
      focusWrap.classList.add('active');
      renderFocus(filtered);
    }
  }

  function renderGrid(filtered) {
    const grid = document.getElementById('cards-grid');
    const existing = new Set();
    grid.querySelectorAll('[data-id]').forEach(el => existing.add(el.dataset.id));

    const currentIds = new Set(filtered.map(r => r.id));
    grid.querySelectorAll('[data-id]').forEach(el => {
      if (!currentIds.has(el.dataset.id)) el.remove();
    });

    filtered.forEach(r => {
      if (existing.has(r.id)) return;

      const card = document.createElement('div');
      card.className = 'card entering';
      card.dataset.id = r.id;

      let html = r.name
        ? '<div class="card-name">' + esc(r.name) + '</div>'
        : '<div class="card-name" style="color:rgba(255,255,255,0.2)">Anonymní</div>';

      html += fieldHtml(r, 'card');
      card.innerHTML = html;

      card.addEventListener('animationend', () => card.classList.remove('entering'), { once: true });
      grid.appendChild(card);
    });
  }

  function renderFocus(filtered) {
    const grid = document.getElementById('focus-grid');
    const existing = new Set();
    grid.querySelectorAll('[data-id]').forEach(el => existing.add(el.dataset.id));

    const currentIds = new Set(filtered.map(r => r.id));
    grid.querySelectorAll('[data-id]').forEach(el => {
      if (!currentIds.has(el.dataset.id)) el.remove();
    });

    filtered.forEach(r => {
      if (existing.has(r.id)) return;

      const card = document.createElement('div');
      card.className = 'focus-card entering';
      card.dataset.id = r.id;

      let html = r.name
        ? '<div class="focus-name">✦ ' + esc(r.name) + '</div>'
        : '<div class="focus-name" style="color:rgba(255,255,255,0.2)">✦ Anonymní</div>';

      html += fieldHtml(r, 'focus');
      card.innerHTML = html;

      card.addEventListener('animationend', () => card.classList.remove('entering'), { once: true });
      grid.appendChild(card);
    });
  }

  function fieldHtml(r, prefix) {
    const fields = [
      { label: 'Nejlepší tip', value: r.bestTip },
      { label: 'Nejzajímavější nástroj', value: r.interestingTool },
      { label: 'Co chceme vyzkoušet', value: r.wantToTry },
      { label: 'Jedna věta', value: r.oneSentence, highlight: true },
    ];
    return fields
      .filter(f => f.value)
      .map(f =>
        '<div class="' + prefix + '-field' + (f.highlight ? ' highlight' : '') + '">' +
          '<div class="' + prefix + '-label">' + f.label + '</div>' +
          '<div class="' + prefix + '-text">' + esc(f.value) + '</div>' +
        '</div>'
      ).join('');
  }

  function updateCounts() {
    document.getElementById('count-all').textContent = allRecords.length;
    TOPIC_NAMES.forEach((name, i) => {
      document.getElementById('count-' + i).textContent =
        allRecords.filter(r => r.topic === name).length;
    });
  }

  async function fetchRecords() {
    try {
      const res = await fetch('/api/stoly');
      const data = await res.json();
      if (data.success && data.records) {
        allRecords = data.records;
        updateCounts();
        syncView();
      }
    } catch (err) {
      console.error('Fetch error:', err);
    }
  }

  function esc(str) {
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }

  document.addEventListener('keydown', (e) => {
    if (e.key === 'g') setMode('grid');
    if (e.key === 'f') setMode('focus');
    if (e.key === '1') switchTab(TOPIC_NAMES[0]);
    if (e.key === '2') switchTab(TOPIC_NAMES[1]);
    if (e.key === '3') switchTab(TOPIC_NAMES[2]);
    if (e.key === '0') switchTab('all');
  });

  setMode('grid');
  fetchRecords();
  setInterval(fetchRecords, 5000);
</script>

</body>
</html>
